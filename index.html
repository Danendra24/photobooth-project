<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTOBOOTH PRO - PRODUCTION READY</title>
    <script src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="Mid-client-r1C08G4XhkgZdTJB"></script>
    <style>
        :root {
            --primary: #6c5ce7; --secondary: #a29bfe; --dark: #2d3436;
            --success: #00b894; --light: #dfe6e9; --accent: #fdcb6e; --danger: #ff7675;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--dark);
            color: var(--light); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { text-align: center; width: 95%; max-width: 1000px; padding: 20px 0; }
        .hidden { display: none !important; }
        .screen {
            background: #3d3d3d; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        button {
            padding: 12px 20px; font-size: 0.9rem; font-weight: 500; cursor: pointer;
            border: 2px solid transparent; border-radius: 10px; background: var(--primary);
            color: white; transition: 0.2s; margin: 5px;
        }
        button:disabled { background: #555 !important; cursor: not-allowed; opacity: 0.6; }
        button.active-opt { background: var(--accent) !important; color: var(--dark) !important; font-weight: bold; border: 2px solid white; }
        #camera-container {
            position: relative; background: #000; border-radius: 15px;
            overflow: hidden; border: 4px solid #fff; margin: 0 auto 15px auto; 
            width: 100%; max-width: 400px; aspect-ratio: 1 / 1;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
        #timer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 8rem; color: white; text-shadow: 0 0 20px #000; z-index: 10;
        }
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 9999;
        }
        .flash-active { animation: flashAnim 0.3s ease-out; }
        @keyframes flashAnim { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        #final-canvas { background: white; border: 8px solid white; width: 100%; max-width: 380px; height: auto; }
        .review-layout { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .theme-item { background: #444; border-radius: 8px; overflow: hidden; cursor: pointer; border: 3px solid transparent; height: 100px; }
        .theme-item.selected { border-color: var(--accent); }
        .theme-item img { width: 100%; height: 100%; object-fit: cover; }

        /* SELECTION UI */
        .selection-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .select-box { position: relative; cursor: pointer; border: 4px solid transparent; border-radius: 10px; overflow: hidden; aspect-ratio: 1/1; }
        .select-box img { width: 100%; height: 100%; object-fit: cover; }
        .select-box.picked { border-color: var(--success); }
        .badge { position: absolute; top: 5px; right: 5px; background: var(--success); color: white; border-radius: 50%; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div class="container">
        
        <div id="screen-config" class="screen">
            <h1>KONFIGURASI PRINTER</h1>
            <p id="printer-status" style="color: var(--danger); margin-bottom: 20px;">Printer Bluetooth Belum Terkoneksi</p>
            <button onclick="connectPrinter()" style="background: var(--primary); padding: 15px 30px; display: block; margin: 10px auto;">HUBUNGKAN PRINTER</button>
            <button onclick="updateStep(1)" style="background: var(--secondary); padding: 15px 30px; display: block; margin: 10px auto;">LANJUT</button>
            <button id="btn-go-pay" class="hidden" onclick="updateStep(1)" style="background: var(--success); padding: 15px 30px;">LANJUT KE PROGRAM</button>
        </div>

        <div id="screen-payment" class="screen hidden">
            <h1>PHOTOBOOTH PRO</h1>
            <p style="color: var(--accent); margin-bottom: 20px;">Selesaikan pembayaran Rp25.000 untuk memulai</p>
            <button id="pay-button" onclick="processPayment()" style="padding: 20px 50px; font-size: 1.3rem; background: var(--success); width: 100%; max-width: 400px;">BAYAR SEKARANG</button>
        </div>

        <div id="screen-1" class="screen hidden">
            <h1>PILIH GRID</h1>
            <button onclick="setGrid(4)">4 GRID</button>
            <button onclick="setGrid(6)">6 GRID</button>
        </div>

        <div id="screen-2" class="screen hidden">
            <div id="camera-container">
                <video id="video" autoplay playsinline></video>
                <div id="timer" class="hidden">5</div>
            </div>
            <h3 id="photo-info" style="color: var(--accent);">Ambil Foto ke-1 dari 8</h3>
            <button id="snap-btn" onclick="countdownStart()" style="width: 100%; font-size: 1.2rem; background: var(--success); padding: 15px;">AMBIL FOTO</button>
        </div>

        <div id="screen-select" class="screen hidden">
            <h1>PILIH FOTO TERBAIK</h1>
            <p id="select-instruction" style="color: var(--accent);">Pilih 0 dari 4 foto</p>
            <div id="selection-container" class="selection-grid"></div>
            <button id="confirm-selection" onclick="showReview()" disabled style="width: 100%; margin-top: 20px; background: var(--success);">LANJUTKAN</button>
        </div>

        <div id="screen-3" class="screen hidden">
            <div class="review-layout">
                <canvas id="final-canvas"></canvas>
                <div style="flex: 1; min-width: 300px; text-align: left; background: #2d3436; padding: 20px; border-radius: 15px;">
                    <h4>Filter</h4>
                    <div style="margin-bottom: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;">
                        <button class="f-btn active-opt" onclick="setFilter('none', this)">Normal</button>
                        <button class="f-btn" onclick="setFilter('grayscale(100%)', this)">B&W</button>
                        <button class="f-btn" onclick="setFilter('sepia(80%)', this)">Sepia</button>
                        <button class="f-btn" onclick="setFilter('contrast(1.1) brightness(1.1) hue-rotate(190deg) saturate(0.8)', this)">Film Blue</button>
                        <button class="f-btn" onclick="setFilter('sepia(30%) contrast(1.1) brightness(1.1) saturate(1.3)', this)">Film Warm</button>
                        <button class="f-btn" onclick="setFilter('contrast(1.2) saturate(0.8) brightness(0.9)', this)">Film</button>
                        <button class="f-btn" onclick="setFilter('brightness(1.2) contrast(0.9) hue-rotate(180deg) saturate(0.5)', this)">Icy</button>
                        <button class="f-btn" onclick="setFilter('sepia(50%) contrast(0.9) brightness(1.1)', this)">Vintage</button>
                        <button class="f-btn" onclick="setFilter('hue-rotate(270deg) saturate(0.8) contrast(1.1)', this)">Twilight</button>
                        <button class="f-btn" onclick="setFilter('contrast(1.5) brightness(0.8) saturate(1.2)', this)">Vignette</button>
                    </div>
                    <h4>Pilih Tema</h4>
                    <div id="theme-list" class="theme-grid"></div>
                    <button id="print-btn" onclick="printAndReset()" style="background: var(--accent); color: var(--dark); width: 100%; margin-top: 20px; padding: 15px; font-weight: bold;">PRINT FOTO</button>
                    <button onclick="downloadCanvas()" style="background: var(--success); width: 100%; margin-top: 10px;">DOWNLOAD PNG</button>
                    <button onclick="location.reload()" style="background: var(--danger); width: 100%; margin-top: 10px;">RESET TOTAL</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const themesData = [
            { id: 't1', name: 'Tema 1', url: 'https://lh3.googleusercontent.com/u/0/d/1lFgs4HxcF5v7dCYPYMVX_jGtRjsO0FLo'},
            { id: 't2', name: 'Tema 2', url: 'https://lh3.googleusercontent.com/u/0/d/18POpDlmQsYNjdMYi9a0grEEvrvCOkXLU'},
            { id: 't3', name: 'Tema 3', url: 'https://lh3.googleusercontent.com/u/0/d/1xOziYz4fjeaS83EHCKqasvf40aUi4iTe'},
            { id: 't4', name: 'Tema 4', url: 'https://lh3.googleusercontent.com/u/0/d/1YanaKsSJ-dtdBjY2uOKvHBvIxGAPo3Vt'},
            { id: 't5', name: 'Tema 5', url: 'https://lh3.googleusercontent.com/u/0/d/1zfp0WFqs8lKF0ZU_B_5JqINQ97VBHH8j'},
        ];

        // DISINI PERUBAHANNYA: Angka disesuaikan agar 1:1 Square
        const GRID_MARKER = {
            4: { paddingTop: 70, paddingLeft: 15, photoW: 175, photoH: 175, gapX: 20, gapY: 20 },
            6: { paddingTop: 40, paddingLeft: 15, photoW: 175, photoH: 175, gapX: 20, gapY: 10 }
        };

        const GAS_URL = "https://script.google.com/macros/s/AKfycbyk9iSMyFkw9RL7a0_aO5wUU1b3FsyJmmLl-n57q2Ds0CVR7ryIgW8SfQtpnwDi-SLW/exec";
        let selectedGrid = 4;
        let photos = [];
        let selectedPhotos = [];
        let stream = null;
        let selectedThemeUrl = themesData[0].url;
        let currentFilter = 'none';
        
        const screens = ['screen-config', 'screen-payment', 'screen-1', 'screen-2', 'screen-select', 'screen-3'];
        let printerCharacteristic = null;

        function updateStep(n) {
            screens.forEach((id, i) => { document.getElementById(id).classList.toggle('hidden', i !== n); });
        }

        async function connectPrinter() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                const characteristics = await service.getCharacteristics();
                printerCharacteristic = characteristics.find(c => c.properties.write);
                document.getElementById('printer-status').innerText = "Printer Terhubung: " + device.name;
                document.getElementById('printer-status').style.color = "var(--success)";
                document.getElementById('btn-go-pay').classList.remove('hidden');
            } catch (err) { alert("Koneksi Printer Gagal: " + err); }
        }

        async function processPayment() {
            const btn = document.getElementById('pay-button');
            btn.disabled = true;
            try {
                const resp = await fetch(`${GAS_URL}?amount=25000`);
                const token = await resp.text();
                window.snap.pay(token, {
                    onSuccess: function(result) { updateStep(2); },
                    onPending: function(result) { alert("Pembayaran tertunda."); btn.disabled = false; },
                    onError: function(result) { alert("Pembayaran Gagal."); btn.disabled = false; },
                    onClose: function() { alert("Selesaikan pembayaran untuk melanjutkan."); btn.disabled = false; }
                });
            } catch (e) { alert("Server Error!"); btn.disabled = false; }
        }

        async function setGrid(grid) { 
            selectedGrid = grid; 
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
                document.getElementById('video').srcObject = stream;
                updateStep(3); 
                updateInfo();
            } catch (err) { alert("Izinkan kamera!"); }
        }

        function updateInfo() { document.getElementById('photo-info').innerText = `Ambil Foto ke-${photos.length + 1} dari 8`; }

        function countdownStart() {
            let t = 1;
            const el = document.getElementById('timer');
            document.getElementById('snap-btn').disabled = true;
            el.innerText = t; el.classList.remove('hidden');
            const counter = setInterval(() => {
                t--; el.innerText = t;
                if(t <= 0) { clearInterval(counter); el.classList.add('hidden'); capturePhoto(); }
            }, 1000);
        }

        function capturePhoto() {
            const flash = document.getElementById('flash');
            flash.classList.add('flash-active');
            setTimeout(() => {
                const v = document.getElementById('video');
                const canvas = document.createElement('canvas');
                const size = Math.min(v.videoWidth, v.videoHeight);
                canvas.width = size; canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
                ctx.drawImage(v, (v.videoWidth-size)/2, (v.videoHeight-size)/2, size, size, 0, 0, size, size);
                photos.push(canvas.toDataURL('image/png'));
                flash.classList.remove('flash-active');
                if(photos.length < 8) {
                    updateInfo();
                    document.getElementById('snap-btn').disabled = false;
                } else {
                    if(stream) stream.getTracks().forEach(t => t.stop());
                    initSelection();
                }
            }, 150);
        }

        function initSelection() {
            updateStep(4);
            selectedPhotos = [];
            const container = document.getElementById('selection-container');
            container.innerHTML = '';
            document.getElementById('select-instruction').innerText = `Pilih ${selectedGrid} foto terbaik`;
            photos.forEach((src, idx) => {
                const box = document.createElement('div');
                box.className = 'select-box';
                box.innerHTML = `<img src="${src}">`;
                box.onclick = () => togglePick(idx, box);
                container.appendChild(box);
            });
        }

        function togglePick(idx, el) {
            const foundIdx = selectedPhotos.indexOf(idx);
            if(foundIdx > -1) {
                selectedPhotos.splice(foundIdx, 1);
                el.classList.remove('picked');
                el.querySelector('.badge')?.remove();
            } else if(selectedPhotos.length < selectedGrid) {
                selectedPhotos.push(idx);
                el.classList.add('picked');
                const badge = document.createElement('div');
                badge.className = 'badge';
                el.appendChild(badge);
            }
            document.getElementById('confirm-selection').disabled = selectedPhotos.length !== selectedGrid;
            document.querySelectorAll('.select-box.picked').forEach((b, i) => {
                b.querySelector('.badge').innerText = i + 1;
            });
        }

        function showReview() {
            updateStep(5);
            const list = document.getElementById('theme-list');
            list.innerHTML = '';
            themesData.forEach(t => {
                const div = document.createElement('div');
                div.className = `theme-item ${t.url === selectedThemeUrl ? 'selected' : ''}`;
                div.onclick = () => { 
                    selectedThemeUrl = t.url; 
                    document.querySelectorAll('.theme-item').forEach(e => e.classList.remove('selected'));
                    div.classList.add('selected');
                    renderFinal(); 
                };
                div.innerHTML = `<img src="${t.url}">`;
                list.appendChild(div);
            });
            renderFinal();
        }

        function setFilter(f, btn) {
            currentFilter = f;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active-opt'));
            btn.classList.add('active-opt');
            renderFinal();
        }

        function renderFinal() {
            const canvas = document.getElementById('final-canvas');
            canvas.width = 400; canvas.height = 600;
            const ctx = canvas.getContext('2d');
            const frame = new Image();
            frame.crossOrigin = "anonymous";
            frame.src = selectedThemeUrl;
            frame.onload = () => {
                ctx.clearRect(0,0,400,600);
                ctx.drawImage(frame, 0, 0, 400, 600);
                const marker = GRID_MARKER[selectedGrid];
                selectedPhotos.forEach((photoIdx, i) => {
                    const p = new Image(); p.src = photos[photoIdx];
                    p.onload = () => {
                        ctx.save();
                        let col = i % 2; 
                        let row = Math.floor(i / 2);
                        let dx = marker.paddingLeft + (col * (marker.photoW + marker.gapX));
                        let dy = marker.paddingTop + (row * (marker.photoH + marker.gapY));
                        ctx.filter = currentFilter;
                        // Draw Image dengan paksa ke dimensi Square
                        ctx.drawImage(p, 0, 0, p.width, p.height, dx, dy, marker.photoW, marker.photoH);
                        ctx.restore();
                    }
                });
            }
        }

        async function printAndReset() {
            if (!printerCharacteristic) { alert("Printer belum terkoneksi!"); return; }
            const btn = document.getElementById('print-btn');
            btn.disabled = true; btn.innerText = "Mencetak...";
            try {
                await printerCharacteristic.writeValue(new Uint8Array([0x1B, 0x40]));
                setTimeout(() => {
                    alert("Cetak selesai!");
                    location.reload(); 
                }, 2000);
            } catch (err) { alert("Gagal mencetak: " + err); btn.disabled = false; }
        }

        function downloadCanvas() {
            const link = document.createElement('a');
            link.download = `photobooth.png`;
            link.href = document.getElementById('final-canvas').toDataURL();
            link.click();
        }
    </script>
</body>
</html>
